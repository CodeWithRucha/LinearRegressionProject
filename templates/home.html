<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #218838;
        }

        h2 {
            color: blue;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="login">
        <h1>FWI Prediction</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <input type="text" name="Temperature" placeholder="Temperature" required>

            <input type="text" name="RH" placeholder="Relative Humidity (RH)" required>

            <input type="text" name="Ws" placeholder="Wind Speed (Ws)" required>

            <input type="text" name="Rain" placeholder="Rain" required>

            <input type="text" name="FFMC" placeholder="FFMC" required>

            <input type="text" name="DMC" placeholder="DMC" required>

            <input type="text" name="ISI" placeholder="ISI" required>

            <input type="text" name="Classes" placeholder="Classes (0 or 1)" required>

            <input type="text" name="Region" placeholder="Region (0 or 1)" required>

            <button type="submit">Predict</button>

        </form>

        <h2>The FWI prediction is {{ results }}</h2>

    </div>

</body>
</html>
